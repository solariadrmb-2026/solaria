<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta name="viewport" content="width-device-width, initial-scale=1.0" />
    <title> Solaria | Dashboard</title>
    <!--CSS-->
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/style.css">
  </head>

  <body>
    <!-- MENU -->
    <div id="menu"></div>
    <main class= "container">
      <h1> 🌿 Horta Automatizada</h1>
      <section class="sensores">
        <div class="card">
          <h2>🌱 Umidade do solo</h2>
          <p id="solo">--%</p>
        </div>
        <div class="card">
          <h2>☀️ Luminosidade</h2>
          <p>id="luz">--1x</p>
        </div>

        <div class="card">
          <h2>🌡️ Temperatura</h2>
          <p id="temp">--°C</p>
        </div>

        <div class="card">
          <h2>🍃 Umidade do ar</h2>
          <p id="ar">--%</p>
        </div>
      </section>

      <section class="status">
        <p>Modo: <strong id="modo">---</strong></p>
        <p>Bomba: <strong id="estadoBomba">---</strong></p>
      </section>

      <div class= "btn-group">
        <button class="btn auto" onclick="setModo(true)">BOMBA AUTOMÁTICA</button>
        <button class="btn manual" onclick="setModo(false)">BOMBA MANUAL</button>
        <button class="btn ligar" onclick="setBomba(true)">LIGAR BOMBA</button>
        <button class="btn desligar" onclick="setBomba(false)"> DESLIGAR BOMBA</button>
        <button class="btn sair" onclick="logout()">SAIR DO SISTEMA</button>
      </div>

    </main>  
    <!--SCRIPTS-->
     <script type="module" src="js/dashboard.js"></script>
     <script type="module" src="js/menu.js"></script>
     <script type="module" src="js/theme.js"></script>
  </body>
</html>
